services:
  - type: web
    name: quran-tracker
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run migrate && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Bishkek
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: COOKIE_SECURE
        value: true
      - key: CORS_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: quran-tracker-db
          property: connectionString

databases:
  - name: quran-tracker-db
    plan: free
